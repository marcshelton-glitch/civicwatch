<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicPulse — Know Your Representatives</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2764;
  --navy-dark: #0D1640;
  --navy-light: #2D3E8C;
  --red: #B22234;
  --red-light: #FFF0F1;
  --red-mid: #E8384D;
  --gold: #C9A84C;
  --gold-light: #FFF8E7;
  --white: #FFFFFF;
  --off-white: #F7F8FC;
  --surface: #EEF1FA;
  --border: #D4D9ED;
  --border-light: #E8ECF5;
  --text: #1a1f3a;
  --text-mid: #4a5072;
  --text-light: #8891b8;
  --green: #1a7a4a;
  --green-light: #e8f7ef;
  --orange: #d4530a;
  --orange-light: #fff3ec;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Source Sans 3', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }
h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
button { cursor: pointer; font-family: 'Source Sans 3', sans-serif; }
input { font-family: 'Source Sans 3', sans-serif; }

/* HEADER */
.header {
  background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-light) 100%);
  color: white;
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(27,39,100,0.4);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--red);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo h1 { font-size: 22px; font-weight: 700; color: white; letter-spacing: -0.3px; }
.logo span { font-size: 11px; color: rgba(255,255,255,0.6); font-family: 'Source Sans 3', sans-serif; font-weight: 400; display: block; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.notif-btn {
  position: relative;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  width: 38px; height: 38px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  transition: background 0.2s;
}
.notif-btn:hover { background: rgba(255,255,255,0.18); }
.notif-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: var(--red-mid);
  color: white;
  font-size: 10px;
  font-weight: 600;
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--navy);
}
.subscribe-btn {
  background: var(--red);
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.1s;
}
.subscribe-btn:hover { background: var(--red-mid); transform: translateY(-1px); }
.nav-tabs {
  display: flex;
  padding: 0 24px;
  gap: 2px;
}
.nav-tab {
  background: transparent;
  color: rgba(255,255,255,0.65);
  border: none;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-tab:hover { color: rgba(255,255,255,0.9); }
.nav-tab.active { color: white; border-bottom-color: var(--gold); }

/* MAIN CONTENT */
.main { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

/* AVATAR */
.avatar {
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
  flex-shrink: 0;
  font-family: 'Playfair Display', serif;
  overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* BADGES */
.badge {
  display: inline-flex; align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.badge-dem { background: #dbeafe; color: #1d4ed8; }
.badge-rep { background: #fee2e2; color: #b91c1c; }
.badge-non { background: #f3f4f6; color: #4b5563; }
.badge-federal { background: var(--navy); color: white; }
.badge-state { background: #6366f1; color: white; }
.badge-municipal { background: var(--green); color: white; }
.badge-yea { background: var(--green-light); color: var(--green); }
.badge-nay { background: var(--red-light); color: var(--red); }
.badge-signed { background: #ede9fe; color: #5b21b6; }
.badge-new { background: var(--red); color: white; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

/* REP CARDS */
.reps-header {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  margin-bottom: 20px;
}
.search-box {
  flex: 1;
  min-width: 200px;
  display: flex;
  align-items: center;
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 0 14px;
  gap: 8px;
  height: 40px;
}
.search-box input {
  border: none;
  outline: none;
  font-size: 14px;
  color: var(--text);
  flex: 1;
  background: transparent;
}
.filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  background: white;
  border: 1.5px solid var(--border);
  color: var(--text-mid);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: var(--navy); color: var(--navy); }
.filter-btn.active { background: var(--navy); border-color: var(--navy); color: white; }

.reps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}
.rep-card {
  background: white;
  border: 1.5px solid var(--border-light);
  border-radius: 14px;
  padding: 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.rep-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.rep-card.federal::before { background: var(--navy); }
.rep-card.state::before { background: #6366f1; }
.rep-card.municipal::before { background: var(--green); }
.rep-card:hover { border-color: var(--navy); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(27,39,100,0.12); }
.rep-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.rep-card-info { flex: 1; }
.rep-card-info h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; color: var(--text); }
.rep-card-info p { font-size: 12px; color: var(--text-mid); }
.rep-card-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.rep-card-actions { display: flex; gap: 8px; margin-top: 12px; }
.track-btn {
  flex: 1;
  padding: 7px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid;
  transition: all 0.2s;
}
.track-btn.tracked { background: var(--navy); border-color: var(--navy); color: white; }
.track-btn.untracked { background: white; border-color: var(--border); color: var(--text-mid); }
.track-btn.untracked:hover { border-color: var(--navy); color: var(--navy); }
.contact-btn-small {
  padding: 7px 10px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--text-mid);
  display: flex; align-items: center; gap: 4px;
  transition: all 0.2s;
  text-decoration: none;
}
.contact-btn-small:hover { border-color: var(--navy); color: var(--navy); }

/* NET WORTH */
.nw-bar-wrapper { margin: 8px 0; }
.nw-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
.nw-bar-track { background: var(--border-light); border-radius: 4px; height: 8px; position: relative; overflow: visible; }
.nw-bar-before { background: var(--text-light); height: 100%; border-radius: 4px; }
.nw-bar-after { background: var(--gold); height: 100%; border-radius: 4px; position: absolute; top: 0; left: 0; }
.nw-enrichment { display: inline-flex; align-items: center; gap: 4px; background: var(--gold-light); border: 1px solid var(--gold); border-radius: 6px; padding: 2px 8px; font-size: 11px; font-weight: 600; color: #8a6820; margin-top: 4px; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10,15,40,0.65);
  z-index: 200;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 20px;
  overflow-y: auto;
}
.modal {
  background: white;
  border-radius: 18px;
  width: 100%;
  max-width: 820px;
  margin: auto;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(10,15,40,0.35);
}
.modal-header {
  background: linear-gradient(135deg, var(--navy-dark), var(--navy));
  color: white;
  padding: 24px;
  display: flex;
  align-items: flex-start;
  gap: 16px;
  position: relative;
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: rgba(255,255,255,0.15);
  border: none;
  color: white;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
  transition: background 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.25); }
.modal-rep-info h2 { font-size: 24px; color: white; margin-bottom: 4px; }
.modal-rep-info p { font-size: 14px; color: rgba(255,255,255,0.75); }
.modal-contact-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.modal-contact-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  border: 1.5px solid rgba(255,255,255,0.3);
  color: white;
  background: rgba(255,255,255,0.12);
  text-decoration: none;
  transition: background 0.2s;
}
.modal-contact-btn:hover { background: rgba(255,255,255,0.22); }
.modal-contact-btn.red { background: var(--red); border-color: var(--red-mid); }
.modal-contact-btn.red:hover { background: var(--red-mid); }

.modal-tabs { display: flex; border-bottom: 1.5px solid var(--border-light); padding: 0 24px; background: white; }
.modal-tab {
  background: none;
  border: none;
  padding: 12px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-light);
  border-bottom: 2px solid transparent;
  margin-bottom: -1.5px;
  transition: all 0.2s;
  white-space: nowrap;
}
.modal-tab:hover { color: var(--navy); }
.modal-tab.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 600; }

.modal-body { padding: 24px; max-height: 520px; overflow-y: auto; }

/* INFO ROWS */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.info-card { background: var(--off-white); border-radius: 10px; padding: 14px; }
.info-card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-light); margin-bottom: 4px; font-weight: 600; }
.info-card-value { font-size: 14px; color: var(--text); font-weight: 500; }

/* VOTING TABLE */
.vote-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.vote-table th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-light); }
.vote-table td { padding: 10px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
.vote-table tr:last-child td { border-bottom: none; }
.vote-table tr:hover td { background: var(--off-white); }
.bill-link { color: var(--navy); font-weight: 600; text-decoration: none; }
.bill-link:hover { text-decoration: underline; }
.outcome-pass { color: var(--green); font-weight: 600; }
.outcome-fail { color: var(--red); font-weight: 600; }

/* TRADE TABLE */
.trade-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.trade-buy { background: var(--green-light); color: var(--green); }
.trade-sell { background: var(--red-light); color: var(--red); }
.crypto-tag { background: #fdf4ff; color: #7c3aed; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 600; }
.stock-tag { background: #eff6ff; color: #1d4ed8; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 600; }

/* CONSTITUTION */
.constitution-controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.toggle-group { display: flex; background: var(--border-light); border-radius: 8px; padding: 3px; gap: 2px; }
.toggle-btn {
  background: transparent;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-mid);
  transition: all 0.2s;
}
.toggle-btn.active { background: white; color: var(--navy); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
.const-item { background: white; border: 1.5px solid var(--border-light); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.const-item-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  transition: background 0.2s;
  gap: 12px;
}
.const-item-header:hover { background: var(--off-white); }
.const-item-header h3 { font-size: 15px; font-weight: 700; color: var(--navy); flex: 1; }
.const-item-year { font-size: 12px; color: var(--text-light); background: var(--surface); padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.const-item-body { padding: 0 18px 18px; font-size: 14px; line-height: 1.7; color: var(--text-mid); border-top: 1px solid var(--border-light); margin-top: 0; padding-top: 14px; }
.const-original { font-family: Georgia, serif; font-style: italic; color: #555; font-size: 13px; line-height: 1.8; }

/* TRACK MY REP */
.notif-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px;
  background: white;
  border: 1.5px solid var(--border-light);
  border-radius: 12px;
  margin-bottom: 10px;
  transition: all 0.2s;
}
.notif-item.unread { border-left: 3px solid var(--navy); background: #f8f9ff; }
.notif-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.notif-vote { background: #e0e7ff; }
.notif-trade { background: var(--gold-light); }
.notif-town { background: var(--green-light); }
.notif-msg { font-size: 14px; color: var(--text); margin-bottom: 2px; }
.notif-date { font-size: 12px; color: var(--text-light); }

/* TOWN HALL */
.event-card { background: white; border: 1.5px solid var(--border-light); border-radius: 12px; padding: 16px; display: flex; gap: 14px; margin-bottom: 12px; }
.event-date-box { background: var(--navy); color: white; border-radius: 8px; padding: 8px 12px; text-align: center; min-width: 52px; }
.event-date-box .month { font-size: 11px; font-weight: 600; text-transform: uppercase; }
.event-date-box .day { font-size: 22px; font-weight: 700; font-family: 'Playfair Display', serif; line-height: 1; }
.event-info h4 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.event-info p { font-size: 13px; color: var(--text-mid); }
.event-type-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 6px; }
.virtual { background: #ede9fe; color: #6d28d9; }
.in-person { background: var(--green-light); color: var(--green); }

/* POLL */
.poll-option {
  background: white;
  border: 1.5px solid var(--border-light);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.poll-option:hover:not(.voted) { border-color: var(--navy); }
.poll-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--surface); z-index: 0; transition: width 0.5s; }
.poll-content { position: relative; z-index: 1; display: flex; justify-content: space-between; align-items: center; }
.poll-option.voted { cursor: default; }
.poll-option.winner { border-color: var(--navy); }
.poll-bar-pct { font-size: 13px; font-weight: 700; color: var(--navy); }

/* MAP */
.map-section { background: white; border: 1.5px solid var(--border-light); border-radius: 14px; padding: 20px; margin-bottom: 24px; }
.map-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.state-grid { display: flex; flex-direction: column; gap: 4px; align-items: center; }
.state-row { display: flex; gap: 4px; justify-content: center; }
.state-btn {
  width: 34px; height: 34px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  font-size: 9px;
  font-weight: 700;
  color: var(--text-mid);
  background: white;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.2px;
}
.state-btn:hover { background: var(--surface); border-color: var(--navy); color: var(--navy); }
.state-btn.selected { background: var(--navy); border-color: var(--navy-dark); color: white; }

/* SECTION TITLES */
.section-title { font-size: 20px; color: var(--navy); margin-bottom: 6px; }
.section-subtitle { font-size: 14px; color: var(--text-light); margin-bottom: 20px; }

/* COMPARE */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.issue-row { display: flex; flex-direction: column; gap: 4px; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
.issue-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700; color: var(--text-light); }
.issue-val { font-size: 13px; color: var(--text); }

/* SUBSCRIPTION */
.sub-section { background: linear-gradient(135deg, var(--navy-dark), var(--navy)); color: white; border-radius: 16px; padding: 32px; text-align: center; margin-top: 40px; }
.sub-section h2 { font-size: 28px; color: white; margin-bottom: 8px; }
.sub-section p { color: rgba(255,255,255,0.75); font-size: 15px; margin-bottom: 24px; }
.plan-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.plan-card { background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 20px; text-align: left; }
.plan-card.featured { background: rgba(255,255,255,0.15); border-color: var(--gold); }
.plan-name { font-size: 14px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.5px; }
.plan-price { font-size: 32px; font-weight: 700; font-family: 'Playfair Display', serif; color: white; margin: 4px 0; }
.plan-price span { font-size: 14px; font-weight: 400; color: rgba(255,255,255,0.6); }
.plan-features { list-style: none; margin-top: 12px; }
.plan-features li { font-size: 13px; color: rgba(255,255,255,0.8); padding: 3px 0; }
.plan-features li::before { content: "✓ "; color: var(--gold); font-weight: 700; }
.cta-btn { background: var(--red); color: white; border: none; padding: 14px 32px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.cta-btn:hover { background: var(--red-mid); transform: translateY(-2px); }

/* DOCKET */
.docket-item { background: white; border: 1.5px solid var(--border-light); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
.docket-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
.docket-info h4 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.docket-info p { font-size: 12px; color: var(--text-light); }
.docket-status { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #fff8e7; color: #92600a; margin-top: 4px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px; color: var(--text-light); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }

/* FOOTER STAR BANNER */
.star-banner { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px; background: var(--red); color: white; font-size: 12px; font-weight: 600; letter-spacing: 1px; }

@media (max-width: 600px) {

/* ===================== HELPERS ===================== */

function fmt(n) {
  if (n >= 1000000) return "$" + (n/1000000).toFixed(1) + "M";
  if (n >= 1000) return "$" + Math.round(n/1000) + "K";
  return "$" + n;
}

function Avatar({ name, size = 44 }) {
  const initials = name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const colors = [
    ["#1B2764","#7b8fd4"],["#B22234","#e88a90"],["#1a7a4a","#7bcda1"],
    ["#5b21b6","#c4b5fd"],["#92600a","#fbbf24"],
  ];
  const [bg, fg] = colors[name.charCodeAt(0) % colors.length];
  return (
    <div className="avatar" style={{width:size,height:size,background:bg,color:fg,fontSize:size*0.36}}>
      {initials}
    </div>
  );
}

function Badge({ text, cls }) {
  return <span className={"badge " + cls}>{text}</span>;
}

function levelBadge(level) {
  const map = { federal:"badge-federal", state:"badge-state", municipal:"badge-municipal" };
  return <Badge text={level} cls={map[level]} />;
}

function partyBadge(party) {
  const map = { Democrat:"badge-dem", Republican:"badge-rep", Nonpartisan:"badge-non" };
  return <Badge text={party} cls={map[party]||"badge-non"} />;
}

/* ===================== NET WORTH BAR ===================== */

function NetWorthBar({ before, after, name }) {
  const max = after * 1.1;
  const pctBefore = Math.round((before/max)*100);
  const pctAfter = Math.round((after/max)*100);
  const enrichment = after - before;
  const pctChange = Math.round(((after-before)/before)*100);
  return (
    <div className="nw-bar-wrapper">
      <div className="nw-bar-label"><span>Est. before taking office</span><span>{fmt(before)}</span></div>
      <div className="nw-bar-track" style={{marginBottom:6}}>
        <div className="nw-bar-before" style={{width:pctBefore+"%"}}></div>
      </div>
      <div className="nw-bar-label"><span>Est. current net worth</span><span>{fmt(after)}</span></div>
      <div className="nw-bar-track">
        <div className="nw-bar-after" style={{width:pctAfter+"%"}}></div>
      </div>
      <div className="nw-enrichment">↑ {fmt(enrichment)} gain while in office (+{pctChange}%)</div>
      <p style={{fontSize:11,color:"var(--text-light)",marginTop:6}}>
        * Estimates based on mandatory public financial disclosure filings. Actual net worth may differ.
      </p>
    </div>
  );
}

function TownHallTab({ rep, pollVotes, onVote, hasVoted }) {
  const total = Object.values(pollVotes).reduce((a,b)=>a+b,0);
  const issues = [
    { key:"housing", label:"Affordable Housing Crisis" },
    { key:"traffic", label:"Traffic & Public Transit" },
    { key:"jobs", label:"Local Jobs & Economy" },
    { key:"environment", label:"Air Quality & Environment" },
  ];
  const maxVotes = Math.max(...Object.values(pollVotes));
  return (
    <div>
      <h3 style={{fontSize:14,fontWeight:700,color:"var(--navy)",marginBottom:12}}>Upcoming Public Events</h3>
      {rep.townHall.length === 0 ? (
        <div className="empty"><div className="empty-icon">📅</div><p>No upcoming public events scheduled.</p></div>
      ) : rep.townHall.map((e,i) => {
        const d = new Date(e.date);
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return (
          <div className="event-card" key={i}>
            <div className="event-date-box">
              <div className="month">{months[d.getMonth()]}</div>
              <div className="day">{d.getDate()}</div>
            </div>
            <div className="event-info">
              <h4>{e.title}</h4>
              <p>📍 {e.location}</p>
              <span className={"event-type-tag " + (e.type==="Virtual"?"virtual":"in-person")}>{e.type}</span>
            </div>
          </div>
        );
      })}

      <h3 style={{fontSize:14,fontWeight:700,color:"var(--navy)",margin:"20px 0 8px"}}>
        Community Priority Poll
      </h3>
      <p style={{fontSize:13,color:"var(--text-light)",marginBottom:12}}>
        What issue should {rep.name.split(" ")[1]} prioritize? Cast your vote below. ({total} votes total)
      </p>
      {issues.map(issue => {
        const votes = pollVotes[issue.key];
        const pct = total > 0 ? Math.round((votes/total)*100) : 0;
        const isWinner = votes === maxVotes;
        return (
          <div
            key={issue.key}
            className={"poll-option" + (hasVoted?" voted":"") + (isWinner&&hasVoted?" winner":"")}
            onClick={()=>onVote(issue.key)}
          >
            <div className="poll-fill" style={{width:hasVoted?pct+"%":"0%",background:isWinner?"var(--light-blue)":"var(--surface)"}}></div>
            <div className="poll-content">
              <span style={{fontSize:14,fontWeight:hasVoted&&isWinner?700:500}}>{issue.label}</span>
              {hasVoted && <span className="poll-bar-pct">{pct}%</span>}
            </div>
          </div>
        );
      })}
      {!hasVoted && <p style={{fontSize:11,color:"var(--text-light)",marginTop:6}}>Click an issue to cast your vote.</p>}
    </div>
  );
}

  const unreadCount = notifications.filter(n=>!n.read).length;

  const filteredReps = REPS.filter(r => {
    if (selectedState && r.state !== selectedState) return false;
    if (levelFilter !== "all" && r.level !== levelFilter) return false;
    if (searchQuery && !r.name.toLowerCase().includes(searchQuery.toLowerCase()) && !r.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  const toggleTrack = (repId) => {
    setTrackedReps(prev => prev.includes(repId) ? prev.filter(id=>id!==repId) : [...prev, repId]);
  };

  const markAllRead = () => {
    setNotifications(prev => prev.map(n=>({...n, read:true})));
  };

  const handleVote = (issue) => {
    if (hasVoted) return;
    setPollVotes(prev => ({...prev, [issue]: prev[issue]+1}));
    setHasVoted(true);
  };

  const openRep = (rep) => {
    setSelectedRep(rep);
    setShowNotifPanel(false);
  };

  const navItems = [
    { key:"reps", label:"🏛 Representatives" },
    { key:"constitution", label:"📜 Constitution" },
    { key:"track", label:`🔔 My Reps ${unreadCount>0?"("+unreadCount+")":""}` },
    { key:"subscribe", label:"⭐ Subscribe" },
  ];

  return (
    <>
      <header className="header">
        <div className="header-top">
          <div className="logo">
            <div className="logo-icon">⭐</div>
            <div>
              <h1>CivicPulse</h1>
              <span>Know Your Representatives</span>
            </div>
          </div>
          <div className="header-actions">
            <button className="notif-btn" onClick={()=>setShowNotifPanel(!showNotifPanel)}>
              🔔
              {unreadCount > 0 && <span className="notif-badge">{unreadCount}</span>}
            </button>
            <button className="subscribe-btn" onClick={()=>setMainTab("subscribe")}>⭐ Go Pro</button>
          </div>
        </div>
        <nav className="nav-tabs">
          {navItems.map(item => (
            <button key={item.key} className={"nav-tab"+(mainTab===item.key?" active":"")} onClick={()=>{setMainTab(item.key);setShowNotifPanel(false)}}>
              {item.label}
            </button>
          ))}
        </nav>
      </header>

      {showNotifPanel && (
        <div style={{position:"fixed",top:98,right:20,width:360,background:"white",border:"1.5px solid var(--border)",borderRadius:14,zIndex:150,boxShadow:"0 12px 32px rgba(27,39,100,0.18)",overflow:"hidden"}}>
          <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border-light)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:700,fontSize:14}}>Notifications</span>
            <button onClick={markAllRead} style={{background:"none",border:"none",fontSize:12,color:"var(--navy)",fontWeight:600,cursor:"pointer"}}>Mark all read</button>
          </div>
          <div style={{maxHeight:350,overflowY:"auto",padding:12}}>
            {notifications.map(n => (
              <div key={n.id} className={"notif-item" + (n.read?"":" unread")} style={{marginBottom:8}}>
                <div style={{fontSize:20}}>{n.type==="vote"?"🗳":n.type==="trade"?"📈":"📅"}</div>
                <div><div style={{fontSize:13}}>{n.message}</div><div style={{fontSize:11,color:"var(--text-light)"}}>{n.date}</div></div>
                {!n.read && <span className="badge badge-new" style={{padding:"2px 6px",fontSize:10}}>NEW</span>}
              </div>
            ))}
          </div>
        </div>
      )}

      <main className="main">
        {mainTab === "reps" && (
          <>
            <h2 className="section-title">Your Representatives</h2>
            <p className="section-subtitle">From your city hall to Capitol Hill — know who represents you at every level of government.</p>

            <StateMap selected={selectedState} onSelect={setSelectedState} />

            <div className="reps-header">
              <div className="search-box">
                <span style={{fontSize:16,color:"var(--text-light)"}}>🔍</span>
                <input placeholder="Search by name or title..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
              </div>
              <div className="filter-btns">
                {["all","federal","state","municipal"].map(f => (
                  <button key={f} className={"filter-btn"+(levelFilter===f?" active":"")} onClick={()=>setLevelFilter(f)}>
                    {f==="all"?"All Levels":f.charAt(0).toUpperCase()+f.slice(1)}
                  </button>
                ))}
              </div>
            </div>

            {filteredReps.length === 0 ? (
              <div className="empty"><div className="empty-icon">🏛</div><p>No representatives match your current filters.</p></div>
            ) : (
              <div className="reps-grid">
                {filteredReps.map(rep => (
                  <RepCard key={rep.id} rep={rep} onClick={()=>openRep(rep)} tracked={trackedReps.includes(rep.id)} onTrack={toggleTrack} />
                ))}
              </div>
            )}
          </>
        )}

        {mainTab === "constitution" && <ConstitutionView />}

        {mainTab === "track" && (
          <TrackView
            notifications={notifications}
            onMarkRead={markAllRead}
            trackedReps={trackedReps}
            allReps={REPS}
            onOpenRep={openRep}
          />
        )}

        {mainTab === "subscribe" && <SubscriptionView />}
      </main>

      <div className="star-banner">
        ★ ★ ★ &nbsp; CIVICPULSE — BUILT FOR AMERICAN DEMOCRACY &nbsp; ★ ★ ★
      </div>

      {selectedRep && (
        <RepDetail
          rep={selectedRep}
          onClose={()=>setSelectedRep(null)}
          tracked={trackedReps.includes(selectedRep.id)}
          onTrack={toggleTrack}
          allReps={REPS}
          pollVotes={pollVotes}
          onVote={handleVote}
          hasVoted={hasVoted}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
